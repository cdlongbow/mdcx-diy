name: CI/CD Pipeline

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update -y && sudo apt-get install -y libglib2.0-0 libegl1 libgl1 libfontconfig1

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Run ruff format
        run: uvx ruff@0.15.12 format --check

      - name: Run ruff check
        run: uvx ruff@0.15.12 check --output-format=github

      - name: Install dependencies
        run: |
          if ! uv sync --locked --dev 2>/dev/null; then
            echo "Lock file out of date, running uv lock..."
            uv lock
            uv sync --dev
          fi

      - name: Run mypy
        run: uv run mypy mdcx/

      - name: Run pytest
        run: uv run pytest tests/ --tb=short -m "not network"
