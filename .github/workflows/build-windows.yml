name: Build Windows EXE

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-2025
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          activate-environment: true

      - name: Install dependencies
        shell: bash
        run: |
          if ! uv sync --locked --all-extras --dev 2>/dev/null; then
            echo "Lock file out of date, running uv lock..."
            uv lock
            uv sync --all-extras --dev
          fi

      - name: Cache cloakbrowser stealth Chromium
        # 缓存 ./chromium, 命中后 build.py 直接跳过 ~562MB 下载(见 scripts/build.py 的跳过逻辑)
        # 版本更新时把末尾的 v1 改为 v2 即可强制刷新缓存
        uses: actions/cache@v4
        with:
          path: chromium
          key: ${{ runner.os }}-cloakbrowser-chromium-v1
          restore-keys: |
            ${{ runner.os }}-cloakbrowser-chromium-

      - name: Build Windows EXE
        env:
          PYTHONIOENCODING: utf-8
        run: uv run scripts/build.py --debug

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v7
        with:
          name: MDCx-Windows-EXE
          path: dist/MDCx.exe
