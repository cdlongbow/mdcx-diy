name: Warm Chromium Cache

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

jobs:
  warm-cache:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-2025]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          activate-environment: true

      - name: Install dependencies
        shell: bash
        run: |
          if ! uv sync --locked --all-extras --dev 2>/dev/null; then
            echo "Lock file out of date, running uv lock..."
            uv lock
            uv sync --all-extras --dev
          fi

      - name: Cache cloakbrowser stealth Chromium
        uses: actions/cache@v4
        with:
          path: chromium
          key: ${{ runner.os }}-cloakbrowser-chromium-v1
          restore-keys: |
            ${{ runner.os }}-cloakbrowser-chromium-

      - name: Download and cache Chromium
        shell: bash
        run: |
          if [ -d chromium ] && ls chromium/chrome-*/* 2>/dev/null | head -1; then
            echo "Chromium already cached, skipping download"
          else
            echo "Downloading stealth Chromium..."
            uv run python scripts/warm_cache.py
          fi