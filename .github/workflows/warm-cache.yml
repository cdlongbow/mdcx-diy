name: Warm Chromium Cache

on:
  schedule:
    # 每周一早8点跑一次，保持 cache 不失效（GitHub cache 7天无访问即淘汰）
    - cron: "0 8 * * 1"
  workflow_dispatch:

jobs:
  warm-cache:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-2025]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          activate-environment: true

      - name: Install dependencies
        shell: bash
        run: |
          if ! uv sync --locked --all-extras --dev 2>/dev/null; then
            echo "Lock file out of date, running uv lock..."
            uv lock
            uv sync --all-extras --dev
          fi

      - name: Cache cloakbrowser stealth Chromium
        uses: actions/cache@v4
        with:
          path: chromium
          key: ${{ runner.os }}-cloakbrowser-chromium-v1
          restore-keys: |
            ${{ runner.os }}-cloakbrowser-chromium-

      - name: Download and cache Chromium
        shell: bash
        run: |
          if [ -d chromium ] && ls chromium/chrome-*/* 2>/dev/null | head -1; then
            echo "Chromium 已缓存，跳过下载"
          else
            echo "下载 stealth Chromium..."
            uv run python3 -c "
import cloakbrowser as cb
import os, shutil
from pathlib import Path
os.environ.setdefault('CLOAKBROWSER_DOWNLOAD_URL',
  'https://v6.gh-proxy.com/https://github.com/CloakHQ/cloakbrowser/releases/download')
binary = cb.ensure_binary()
if binary:
  platform_sub = {'Windows': 'chrome-win64', 'Linux': 'chrome-linux', 'Darwin': 'chrome-macos'}
  src = Path(binary).resolve().parent
  dest = Path('chromium') / platform_sub.get(os.name, 'chrome-win64')
  dest.mkdir(parents=True, exist_ok=True)
  shutil.copytree(src, dest, dirs_exist_ok=True)
  print(f'Chromium 已缓存到 {dest}')
"
          fi